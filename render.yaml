services:
  - name: gold-price-updater
    type: cron
    env: python
    schedule: "0 0 * * *"  # Daily at midnight UTC
    timeout_seconds: 900   # Max runtime of 15 minutes
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install pandas yfinance requests schedule
    startCommand: python update_gold_prices.py
    envVars:
      - key: PERSONAL_ACCESS_TOKEN
        sync: false
